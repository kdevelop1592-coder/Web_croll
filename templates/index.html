<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danawa Lowest Price Crawler</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 3rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .search-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .search-input {
            flex: 1;
            padding: 1.2rem 1.5rem;
            font-size: 1.1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: var(--text-color);
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .search-btn {
            padding: 0 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
        }

        .search-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Area */
        .results-container {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .results-header h2 {
            font-size: 1.25rem;
            color: var(--text-color);
        }

        .download-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .download-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.5);
            transform: translateY(-1px);
        }

        /* Table Styles */
        .table-wrapper {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.2rem 1.5rem;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .rank-badge {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 0.3rem 0.6rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .price-highlight {
            color: #fca5a5;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .product-link {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-link:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        .shop-name {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .error-message {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-top: 1rem;
            display: none;
        }

        @media (max-width: 768px) {
            .glass-panel { padding: 1.5rem; }
            .search-container { flex-direction: column; }
            .search-btn { padding: 1.2rem; }
            th, td { padding: 1rem; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <div class="header">
            <h1>Danawa Price Tracker</h1>
            <p>다나와 최저가 기계식 키보드 자동 검색기</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="상품명을 입력하세요 (예: 기계식 키보드, 독거미 키보드)" value="기계식 키보드" autocomplete="off">
            <button id="searchBtn" class="search-btn">
                <span class="btn-text">최저가 검색</span>
                <div class="spinner"></div>
            </button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="resultsContainer" class="results-container">
            <div class="results-header">
                <h2>검색 결과 <span style="color:var(--text-muted);font-size:0.9rem;font-weight:normal;" id="resultCount">(Top 10)</span></h2>
                <a href="#" id="downloadBtn" class="download-btn" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    CSV 다운로드
                </a>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th width="10%">순위</th>
                            <th width="45%">상품명</th>
                            <th width="20%">최저가</th>
                            <th width="25%" class="hide-mobile">판매처</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Results will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const btnText = document.querySelector('.btn-text');
        const spinner = document.querySelector('.spinner');
        const resultsContainer = document.getElementById('resultsContainer');
        const tableBody = document.getElementById('tableBody');
        const errorMessage = document.getElementById('errorMessage');
        const downloadBtn = document.getElementById('downloadBtn');

        // Execute search on enter
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        searchBtn.addEventListener('click', performSearch);

        async function performSearch() {
            const keyword = searchInput.value.trim();
            if (!keyword) {
                showError("검색어를 입력해주세요.");
                return;
            }

            // Set Loading state
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            searchBtn.disabled = true;
            errorMessage.style.display = 'none';
            resultsContainer.style.display = 'none';

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword })
                });

                const data = await response.json();

                if (!response.ok || data.error) {
                    throw new Error(data.error || "서버 오류가 발생했습니다.");
                }

                renderResults(data.data);
                
                if (data.filename) {
                    downloadBtn.href = `/api/download/${data.filename}`;
                    downloadBtn.style.display = 'flex';
                }

                resultsContainer.style.display = 'block';

            } catch (error) {
                showError(error.message);
            } finally {
                // Remove Loading state
                btnText.style.display = 'block';
                spinner.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        function renderResults(items) {
            tableBody.innerHTML = '';
            
            items.forEach((item, index) => {
                const tr = document.createElement('tr');
                
                // Format price 
                const formattedPrice = new Intl.NumberFormat('ko-KR').format(item.가격) + '원';
                
                // Add staggered animation delay
                tr.style.animation = `fadeIn 0.3s ease-out ${index * 0.05}s forwards`;
                tr.style.opacity = '0';
                
                tr.innerHTML = `
                    <td>
                        <span class="rank-badge">${index + 1}</span>
                    </td>
                    <td>
                        <a href="${item.링크}" target="_blank" class="product-link" title="${item.상품명}">
                            ${item.상품명}
                        </a>
                    </td>
                    <td>
                        <span class="price-highlight">${formattedPrice}</span>
                    </td>
                    <td class="hide-mobile">
                        <span class="shop-name">${item.판매처}</span>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }
        
    });
</script>
</body>
</html>
